{{ define "main" }}
  <header class="content-header">
    <h1>{{ .Title | markdownify }}</h1>
  </header>

  {{ .Content }}

  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title | markdownify }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 Jan 2006" }}</time>
      </li>
    {{ end }}
  </ul>
{{ end }}
